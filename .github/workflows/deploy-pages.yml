name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visualization_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: visualization_app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish gh-pages branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf "$RUNNER_TEMP/pages"
          mkdir -p "$RUNNER_TEMP/pages"
          cp -R dist/* "$RUNNER_TEMP/pages/"
          cd ..
          git fetch origin gh-pages || true
          git switch --orphan gh-pages
          git rm -rf . || true
          cp -R "$RUNNER_TEMP/pages/"* .
          touch .nojekyll
          git add .
          git commit -m "Deploy dashboard to GitHub Pages"
          git push -f origin gh-pages
